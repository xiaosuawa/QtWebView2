name: Publish Python Package

on:
  release:
    types: [published] # 当一个 Release 被发布时触发

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools wheel

      - name: Validate version match
        run: |
          pyprojectVersion=$(grep -Po 'version\s*=\s*"\K[^"]+' pyproject.toml)
          gitTag="${{ github.ref }}"
          gitTagVersion="${gitTag##*/}"
          gitTagVersion="${gitTagVersion#v}"
          if [ "$pyprojectVersion" != "$gitTagVersion" ]; then
            echo "Version mismatch: pyproject.toml=$pyprojectVersion vs tag=$gitTag"
            exit 1
          fi
          echo "Versions match: $pyprojectVersion"

      - name: Build release distributions
        run: |
          python -m build --outdir dist/

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/qtwebview2/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
